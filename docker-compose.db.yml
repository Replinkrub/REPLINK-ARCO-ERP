services:
  postgres:
    image: postgres:16-alpine
    container_name: arco-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arco_erp
      POSTGRES_USER: arco
      POSTGRES_PASSWORD: arco
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U arco -d arco_erp']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - arco_erp_pg_data:/var/lib/postgresql/data

volumes:
  arco_erp_pg_data:
